<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Learning Hub</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f7f7f7;
  margin: 0;
}
.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
button {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}
.correct { background: #58cc02; color: white; }
.wrong { background: #ff4b4b; color: white; }
.option {
  display: block;
  padding: 10px;
  border: 2px solid #ddd;
  border-radius: 10px;
  margin: 5px 0;
  cursor: pointer;
}
.option:hover { background: #f0f0f0; }
.feedback {
  font-weight: bold;
  margin-top: 10px;
}
.hint {
  color: #888;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="container">
  <h1>English Learning Hub</h1>
  <div id="lesson"></div>
  <div id="exercises"></div>
</div>

<script>
const data = {
  title: "Unit 1: Family",
  theory: [
    { title: "Vocabulary", content: "Husband, wife, son, daughter..." },
    { title: "Pronunciation", content: "English has more than 40 sounds." }
  ],
  exercises: [
    {
      type: "fill",
      question: "He is a good ___ to his wife.",
      answer: "husband",
      hint: "Marriage word",
      explanation: "Husband = married man"
    },
    {
      type: "mcq",
      question: "Which is a female child?",
      options: ["son", "daughter", "uncle"],
      answer: "daughter"
    }
  ]
};

function renderLesson() {
  const el = document.getElementById("lesson");
  el.innerHTML = `<div class='card'><h2>${data.title}</h2></div>`;
  data.theory.forEach(t => {
    el.innerHTML += `<div class='card'><h3>${t.title}</h3><p>${t.content}</p></div>`;
  });
}

function renderExercises() {
  const el = document.getElementById("exercises");
  data.exercises.forEach((ex, i) => {
    let html = `<div class='card'><p>${ex.question}</p>`;

    if (ex.type === "fill") {
      html += `
        <input id='input-${i}'>
        <button onclick="checkFill(${i})">Check</button>
        <div class='hint' onclick="showHint(${i})">Hint</div>
        <div id='feedback-${i}' class='feedback'></div>
      `;
    }

    if (ex.type === "mcq") {
      ex.options.forEach(opt => {
        html += `<div class='option' onclick="checkMCQ(${i}, '${opt}')">${opt}</div>`;
      });
      html += `<div id='feedback-${i}' class='feedback'></div>`;
    }

    html += `</div>`;
    el.innerHTML += html;
  });
}

function checkFill(i) {
  const input = document.getElementById(`input-${i}`).value.toLowerCase();
  const fb = document.getElementById(`feedback-${i}`);
  if (input === data.exercises[i].answer) {
    fb.innerHTML = "Correct!";
    fb.className = "feedback correct";
  } else {
    fb.innerHTML = "Try again!";
    fb.className = "feedback wrong";
  }
}

function checkMCQ(i, choice) {
  const fb = document.getElementById(`feedback-${i}`);
  if (choice === data.exercises[i].answer) {
    fb.innerHTML = "Correct!";
    fb.className = "feedback correct";
  } else {
    fb.innerHTML = "Wrong!";
    fb.className = "feedback wrong";
  }
}

function showHint(i) {
  alert(data.exercises[i].hint + "\n" + data.exercises[i].explanation);
}

renderLesson();
renderExercises();
</script>
</body>
</html>
